<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chicken Admin Portal</title>
     <link rel="stylesheet" href="css/index.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="login-box">

       
        <img src="logo.png" alt="My Chicken Logo" class="brand-logo">

        <h2>Admin Portal</h2>

        <p class="subtitle">
            Secure access to orders, inventory management, customer records,
            and daily business operations.
        </p>

        <input
            type="text"
            id="email"
            placeholder="Enter Email"
            required
        >

        <div class="password-box">

          <input
             type="password"
             id="password"
             placeholder="Password"
             required
           >
           <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <button onclick="login()">
            Login
        </button>

        <p id="msg"></p>

        <div class="footer">
            My Chicken Management System
        </div>

    </div>

    <script>
    
        async function login (){

            const email =
            document.getElementById("email").value;

            const password =
            document.getElementById("password").value;

            if(password=="" || email==""){
                alert ('Enter valid information ')
                return 
            }

            const requestForVerification= await fetch("https://fullappchicken.onrender.com/login",{
                method:"POST",
                headers:{
                    "Content-Type": "application/json"
                },
                body:JSON.stringify({
                     email,
                     password
                })
            })
            
            const response= await requestForVerification.json();
            console.log(response);

            if (requestForVerification.ok) {
                alert("Login Successful");
                localStorage.setItem("token", response.Token);
                window.location.href = "dashboard.html";
                password.value=""
                email.value=""
             } 

        }

        // for password eye open and close
        function togglePassword() {
            const password = document.getElementById("password");
            const eye = document.querySelector(".toggle-password");

            if (password.type === "password") {
               password.type = "text";
               eye.classList.replace("fa-eye", "fa-eye-slash");
            } else {
               password.type = "password";
               eye.classList.replace("fa-eye-slash", "fa-eye");
            }
}

    </script>

</body>
</html>
