<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chicken Admin Portal</title>
     <link rel="stylesheet" href="css/index.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="login-box">

       
        <img src="logo.png" alt="My Chicken Logo" class="brand-logo">

        <h2>Admin Portal</h2>

        <p class="subtitle">
            Secure access to orders, inventory management, customer records,
            and daily business operations.
        </p>

        <input
            type="text"
            id="username"
            placeholder="Username"
        >

        <div class="password-box">

          <input
             type="password"
             id="password"
             placeholder="Password"
           >
           <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <button onclick="login()">
            Login
        </button>

        <p id="msg"></p>

        <div class="footer">
            My Chicken Management System
        </div>

    </div>

    <script>

        function login(){

            const username =
            document.getElementById("username").value;

            const password =
            document.getElementById("password").value;

            if(
                username === "pranayLimbu" &&
                password === "myChickenApp"
            ){

                localStorage.setItem(
                    "adminLoggedIn",
                    "true"
                );

                window.location.href =
                "dashboard.html";

            }
            else{

                document.getElementById("msg")
                .innerText =
                "Invalid username or password";

            }

        }

        // for password eye open and close
        function togglePassword() {
            const password = document.getElementById("password");
            const eye = document.querySelector(".toggle-password");

            if (password.type === "password") {
               password.type = "text";
               eye.classList.replace("fa-eye", "fa-eye-slash");
            } else {
               password.type = "password";
               eye.classList.replace("fa-eye-slash", "fa-eye");
            }
}

    </script>

</body>
</html>
